spring.application.name=main_server
server.port=8080

#JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


spring.datasource.url=jdbc:postgresql://localhost:5432/earzuhal_main_server


spring.datasource.username=postgres
# Use environment variable for security
spring.datasource.password=${POSTGRES_DB_PASSWORD:?POSTGRES_DB_PASSWORD is not set}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-minimum-512-bits-for-hs512-algorithm-security}
jwt.expiration-ms=86400000
# 24 hours in milliseconds
jwt.refresh-expiration-ms=604800000
# 7 days in milliseconds

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200
