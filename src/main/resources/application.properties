spring.application.name=main_server
server.port=8080

# .env dosyasından ortam değişkenlerini yükle (varsa)
spring.config.import=optional:file:.env[.properties]

#JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


spring.datasource.url=jdbc:postgresql://localhost:5432/earzuhal_main_server


spring.datasource.username=postgres
# Use environment variable for security
spring.datasource.password=${POSTGRES_DB_PASSWORD:?POSTGRES_DB_PASSWORD is not set}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=${JWT_SECRET:?JWT_SECRET environment variable is required. Generate with: openssl rand -base64 64}
jwt.expiration-ms=86400000
# 24 hours in milliseconds
jwt.refresh-expiration-ms=604800000
# 7 days in milliseconds

# CORS Configuration (production'da env var ile override et)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:19006,http://localhost:8081}

# Microservice URLs
services.nlp.base-url=${NLP_SERVICE_URL:http://localhost:8001}
services.graphrag.base-url=${GRAPHRAG_SERVICE_URL:http://localhost:8000}
services.statistics.base-url=${STATISTICS_SERVICE_URL:http://localhost:8002}
services.chatbot.base-url=${CHATBOT_SERVICE_URL:http://localhost:8003}
# Dahili API anahtarı (Python servislerine X-Internal-API-Key header'ında gönderilir)
services.internal-api-key=${INTERNAL_API_KEY:}

# Disclaimer versiyonu (metin güncellendiğinde burayı artır — eski kabuller geçersiz sayılır)
disclaimer.version=1.0

# Logging
logging.level.com.earzuhal=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.openhtmltopdf=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
