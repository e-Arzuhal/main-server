spring.application.name=main_server
server.port=8080
app.env=${APP_ENV:development}

# .env dosyasından ortam değişkenlerini yükle (varsa)
spring.config.import=optional:file:.env[.properties]

#JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}


spring.datasource.url=jdbc:postgresql://localhost:5432/earzuhal_main_server


spring.datasource.username=postgres
# Use environment variable for security
spring.datasource.password=${POSTGRES_DB_PASSWORD:?POSTGRES_DB_PASSWORD is not set}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=${JWT_SECRET:?JWT_SECRET environment variable is required. Generate with: openssl rand -base64 64}

# TC Kimlik Encryption (AES-256)
# Generate: openssl rand -base64 32
tc.encryption.key=${TC_ENCRYPTION_KEY:?TC_ENCRYPTION_KEY must be set. Generate with: openssl rand -base64 32}
jwt.expiration-ms=86400000
# 24 hours in milliseconds
jwt.refresh-expiration-ms=604800000
# 7 days in milliseconds

# Auth rate limit
auth.rate-limit.login.max-attempts=${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:10}
auth.rate-limit.login.window-seconds=${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
auth.rate-limit.register.max-attempts=${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:5}
auth.rate-limit.register.window-seconds=${AUTH_RATE_LIMIT_REGISTER_WINDOW_SECONDS:3600}
# 2FA brute-force koruması (6 haneli kod => agresif limit)
auth.rate-limit.2fa-verify.max-attempts=${AUTH_RATE_LIMIT_2FA_VERIFY_MAX_ATTEMPTS:5}
auth.rate-limit.2fa-verify.window-seconds=${AUTH_RATE_LIMIT_2FA_VERIFY_WINDOW_SECONDS:300}
auth.rate-limit.2fa-send.max-attempts=${AUTH_RATE_LIMIT_2FA_SEND_MAX_ATTEMPTS:3}
auth.rate-limit.2fa-send.window-seconds=${AUTH_RATE_LIMIT_2FA_SEND_WINDOW_SECONDS:300}
security.trust-forwarded-headers=${SECURITY_TRUST_FORWARDED_HEADERS:false}

# CORS Configuration (production'da env var ile override et)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:19006,http://localhost:8081,http://localhost:5173}

# Microservice URLs
services.nlp.base-url=${NLP_SERVICE_URL:http://localhost:8001}
# NLP yanıt zaman aşımı (Ollama inferansı yerel donanımda 20-60 sn sürebilir)
services.nlp.response-timeout-seconds=${NLP_RESPONSE_TIMEOUT_SECONDS:120}
services.graphrag.base-url=${GRAPHRAG_SERVICE_URL:http://localhost:8000}
# GraphRAG yanıt zaman aşımı (LLM çağrıları yerel donanımda uzun sürebilir)
services.graphrag.response-timeout-seconds=${GRAPHRAG_RESPONSE_TIMEOUT_SECONDS:120}
services.statistics.base-url=${STATISTICS_SERVICE_URL:http://localhost:8002}
services.chatbot.base-url=${CHATBOT_SERVICE_URL:http://localhost:8003}
# Gemini çağrısı dahil chatbot yanıt zaman aşımı (saniye) — LLM yavaş yanıtlarda 15 sn yetmiyor
services.chatbot.response-timeout-seconds=${CHATBOT_RESPONSE_TIMEOUT_SECONDS:90}
services.statistics.retry.max-attempts=${STATISTICS_RETRY_MAX_ATTEMPTS:2}
services.statistics.retry.backoff-ms=${STATISTICS_RETRY_BACKOFF_MS:300}
# Dahili API anahtarı (Python servislerine X-Internal-API-Key header'ında gönderilir)
services.internal-api-key=${INTERNAL_API_KEY:}

# Disclaimer versiyonu (metin güncellendiğinde burayı artır — eski kabuller geçersiz sayılır)
disclaimer.version=1.0

# Swagger (dev only — set swagger.enabled=true in .env for local development)
swagger.enabled=${SWAGGER_ENABLED:false}

# Logging
logging.level.com.earzuhal=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.openhtmltopdf=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] [%X{requestId:-no-rid}] %logger{36} - %msg%n

# Mail (Password reset / 2FA / abonelik bildirimleri)
# mail.enabled=false ise mailler sadece log'a yazılır (dev/test için).
mail.enabled=${MAIL_ENABLED:false}
mail.from=${MAIL_FROM:noreply@earzuhal.com}
# Demo talebi geldiğinde operasyon ekibine bildirim gidecek adres (boş bırakılırsa gönderilmez)
mail.demo.notify=${MAIL_DEMO_NOTIFY:}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# Frontend public URL (Password reset linki bu URL'yi kullanır)
app.public-url=${APP_PUBLIC_URL:http://localhost:3000}
