<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<!--/* Shared PDF styles — included by all contract/petition templates via th:replace */-->
<th:block th:fragment="styles">
<style>
    /* ── Page layout ─────────────────────────────────────────────────────── */
    @page {
        size: A4;
        margin: 2.5cm 2cm 3cm 2cm;

        @bottom-left {
            content: "e-Arzuhal — Dijital Hukuk Sistemi";
            font-size: 7.5pt;
            color: #aaa;
            font-family: 'Noto Serif', 'Times New Roman', serif;
        }
        @bottom-center {
            content: "Belge Parmak İzi: " string(docHash);
            font-size: 7pt;
            color: #bbb;
            font-family: 'Noto Serif', 'Times New Roman', serif;
        }
        @bottom-right {
            content: "Sayfa " counter(page) " / " counter(pages);
            font-size: 7.5pt;
            color: #aaa;
            font-family: 'Noto Serif', 'Times New Roman', serif;
        }
    }

    /* ── Base typography ─────────────────────────────────────────────────── */
    body {
        font-family: 'Noto Serif', 'Times New Roman', serif;
        font-size: 11pt;
        color: #1a1a1a;
        line-height: 1.65;
        margin: 0;
        padding: 0;
        text-align: justify;
    }

    /* ── TASLAK filigranı (yalnızca DRAFT belgeler) ───────────────────────── */
    .watermark {
        position: fixed;
        top: 38%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-45deg);
        font-size: 88pt;
        font-weight: bold;
        color: rgba(210, 0, 0, 0.055);
        white-space: nowrap;
        z-index: -1;
        letter-spacing: 6px;
    }

    /* ── Belge başlığı ───────────────────────────────────────────────────── */
    .doc-header {
        text-align: center;
        border-bottom: 2px solid #1a1a5e;
        padding-bottom: 14px;
        margin-bottom: 22px;
    }
    .brand {
        font-size: 8.5pt;
        color: #1a1a5e;
        letter-spacing: 2.5px;
        font-weight: bold;
        text-transform: uppercase;
    }
    .doc-title {
        font-size: 16pt;
        font-weight: bold;
        color: #1a1a5e;
        margin: 7px 0 5px 0;
        letter-spacing: 1px;
    }
    .doc-ref {
        font-size: 8.5pt;
        color: #555;
        margin: 0;
    }

    /* ── Durum rozeti ────────────────────────────────────────────────────── */
    .status-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 8.5pt;
        font-weight: bold;
        color: white;
        background: #888;
    }
    .status-DRAFT     { background: #d97706; }
    .status-PENDING   { background: #6b7280; }
    .status-APPROVED  { background: #2d8a4e; }
    .status-COMPLETED { background: #1a6ea8; }
    .status-REJECTED  { background: #b91c1c; }

    /* ── Bölümler ────────────────────────────────────────────────────────── */
    .section { margin-bottom: 18px; }
    .section-title {
        font-size: 10.5pt;
        font-weight: bold;
        color: #1a1a5e;
        border-bottom: 1px solid #c8c8dd;
        padding-bottom: 3px;
        margin-bottom: 9px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* ── Taraf bilgileri tablosu ─────────────────────────────────────────── */
    table.parties {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 4px;
    }
    table.parties td {
        padding: 4px 8px;
        vertical-align: top;
    }
    table.parties td:first-child {
        font-weight: bold;
        width: 160px;
        color: #333;
    }

    /* ── İçerik kutusu ───────────────────────────────────────────────────── */
    .content-box {
        background: #fafafa;
        border: 1px solid #dde;
        border-radius: 3px;
        padding: 13px 15px;
        white-space: pre-wrap;
        font-size: 10.5pt;
        line-height: 1.7;
    }

    /* ── Tutar kutusu ────────────────────────────────────────────────────── */
    .amount-box {
        display: inline-block;
        background: #eef0ff;
        border: 1px solid #9999aa;
        padding: 6px 16px;
        border-radius: 3px;
        font-size: 12pt;
        font-weight: bold;
        color: #1a1a5e;
        margin: 4px 0;
    }

    /* ── İmza alanı ──────────────────────────────────────────────────────── */
    .signatures {
        margin-top: 44px;
        page-break-inside: avoid;
    }
    .sig-row    { display: table; width: 100%; }
    .sig-cell   { display: table-cell; width: 50%; vertical-align: top; text-align: center; padding: 0 20px; }
    .sig-line   { border-top: 1px solid #333; margin: 44px 20px 7px 20px; }
    .sig-label  { font-weight: bold; font-size: 10pt; color: #1a1a5e; }
    .sig-name   { font-size: 10pt; margin-top: 4px; }
    .sig-date   { font-size: 9pt; color: #555; margin-top: 3px; }

    /* ── Onay bloğu (APPROVED / COMPLETED belgeler) ──────────────────────── */
    .approval-block {
        margin-top: 22px;
        padding: 12px 16px;
        border: 1px solid #2d8a4e;
        border-radius: 4px;
        background: #f0faf4;
        page-break-inside: avoid;
    }
    .approval-block-title {
        font-size: 9.5pt;
        font-weight: bold;
        color: #2d8a4e;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }
    .approval-row {
        display: table;
        width: 100%;
        font-size: 9pt;
        margin-bottom: 3px;
    }
    .approval-label { display: table-cell; color: #555; width: 160px; }
    .approval-value { display: table-cell; font-weight: bold; color: #1a1a1a; }

    /* ── Hash string için CSS custom property ────────────────────────────── */
    /* openhtmltopdf string() fonksiyonuyla @bottom-center'a taşınır */
    .doc-hash-anchor { string-set: docHash content(); display: none; }
</style>
</th:block>
</head>
</html>
